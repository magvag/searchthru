<!doctype html>
<html lang="en">
    <head>
        <style>
            :root {
                color-scheme: light dark;
                --primary: light-dark(#fff, #111);
                background-color: var(--primary);
                /* hidden because first incognito query */
                /* will render page before redirecting  */
                visibility: hidden;
            }
        </style>
        <link
            id="homepageStylesheet"
            rel="stylesheet"
            href="/global.css"
            media="print"
        />

        <script>
            // first incognito search query will load this page
            // since there is no service worker to intercept
            const url = new URL(window.location.href);
            const query = url.searchParams.get("q")?.trim() ?? "";
            if (query && !navigator.serviceWorker?.controller) {
                const fallback = `https://duckduckgo.com/?q=${encodeURIComponent(
                    query,
                )}`;
                window.location.replace(fallback);
                return;
            }
        </script>

        <script src="/interface.js" defer></script>
        <script defer>
            if ("serviceWorker" in navigator) {
                navigator.serviceWorker
                    .register("/sw.js", { scope: "/" })
                    .catch(() => {});
            }
        </script>

        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SearchThru!</title>
        <link
            rel="icon"
            type="image/png"
            href="/assets/favicon.png"
            sizes="32x32"
        />
        <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
        <link
            rel="search"
            type="application/opensearchdescription+xml"
            title="SearchThru!"
            href="/opensearch.xml"
        />
    </head>
    <body>
        <div id="app"></div>
    </body>
</html>
